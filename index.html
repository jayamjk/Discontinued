<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalogue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #6c63ff;
      --accent2: #ff4d6d;
      --text: #e8e8f0;
      --muted: #888898;
      --disc-bg: #1a0a0e;
      --disc-border: #ff4d6d55;
      --disc-ribbon: #ff4d6d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d0d0f 0%, #1a1a2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 11px 16px 11px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #6c63ff22;
    }

    #search::placeholder { color: var(--muted); }

    .stats {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    .stat {
      text-align: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
    }

    .stat-num {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-num.disc { color: var(--accent2); }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 32px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .filter-btn.disc-btn.active { background: var(--accent2); border-color: var(--accent2); }

    /* ── Grid ── */
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px 32px 48px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.22s ease,
                  border-color 0.22s ease;
      position: relative;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px #00000060, 0 0 0 1px var(--accent)44;
      border-color: var(--accent)88;
    }

    .card.discontinued {
      background: var(--disc-bg);
      border-color: var(--disc-border);
      opacity: 0.85;
    }

    .card.discontinued:hover {
      box-shadow: 0 20px 40px #00000060, 0 0 0 1px var(--accent2)44;
      border-color: var(--accent2)88;
    }

    /* Ribbon */
    .ribbon {
      position: absolute;
      top: 12px;
      right: -28px;
      background: var(--disc-ribbon);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 4px 36px;
      transform: rotate(35deg);
      box-shadow: 0 2px 8px #ff4d6d55;
      display: none;
      z-index: 2;
    }

    .card.discontinued .ribbon { display: block; }

    /* Image wrapper */
    .img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .card:hover .img-wrap img { transform: scale(1.06); }
    .card.discontinued .img-wrap img { filter: grayscale(60%) brightness(0.7); }

    /* Fallback icon */
    .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.72rem;
      display: none;
    }

    .fallback svg { opacity: 0.35; }

    /* Card body */
    .card-body {
      padding: 12px 14px 14px;
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.2s;
    }

    .card.discontinued .card-title { color: var(--accent2); text-decoration: line-through; opacity: 0.75; }

    .card-action {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .card.discontinued .card-action { color: var(--accent2); }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .card.discontinued .dot { background: var(--accent2); }

    /* Ripple on click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(108,99,255,0.3);
      animation: rippleAnim 0.5s linear;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Empty state */
    #empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    #empty svg { margin-bottom: 16px; opacity: 0.3; }
    #empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 16px 16px; }
      .header-inner { gap: 14px; }
      main { padding: 16px 16px 40px; }
      .filter-bar { padding: 12px 16px 0; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    }

    @media (max-width: 380px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 8px 32px #00000080;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

const STORAGE_KEY = 'discontinued_products_v1';

// ── State ──────────────────────────────────────────────────────────
let discontinued = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let currentFilter = 'all';
let searchQuery = '';

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...discontinued]));
}

// ── Render ────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const statShown = document.getElementById('stat-shown');
const statDisc = document.getElementById('stat-disc');

function buildCard(product, index) {
  const isDisc = discontinued.has(index);
  const card = document.createElement('div');
  card.className = 'card' + (isDisc ? ' discontinued' : '');
  card.dataset.index = index;

  const hasImage = product.image && product.image.trim() !== '';

  card.innerHTML = `
    <div class="ribbon">Discontinued</div>
    <div class="img-wrap">
      ${hasImage
        ? `<img src="${product.image}" alt="${product.title.replace(/"/g,'&quot;')}"
               loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : ''}
      <div class="fallback" ${hasImage ? '' : 'style="display:flex"'}>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        No image
      </div>
    </div>
    <div class="card-body">
      <div class="card-title">${product.title}</div>
      <div class="card-action">
        <div class="dot"></div>
        ${isDisc ? 'Discontinued' : 'Click to mark discontinued'}
      </div>
    </div>`;

  card.addEventListener('click', (e) => toggleDiscontinued(e, index, card));
  return card;
}

function render() {
  const q = searchQuery.toLowerCase();

  const filtered = PRODUCTS.map((p, i) => ({ p, i })).filter(({ p }) => {
    const matchSearch = p.title.toLowerCase().includes(q);
    const isDisc = discontinued.has(PRODUCTS.indexOf(p)); // use index directly below
    return matchSearch;
  });

  // re-map using correct index
  const mapped = PRODUCTS.reduce((acc, p, i) => {
    const matchSearch = p.title.toLowerCase().includes(q);
    if (!matchSearch) return acc;
    if (currentFilter === 'active' && discontinued.has(i)) return acc;
    if (currentFilter === 'discontinued' && !discontinued.has(i)) return acc;
    acc.push({ p, i });
    return acc;
  }, []);

  grid.innerHTML = '';
  mapped.forEach(({ p, i }) => grid.appendChild(buildCard(p, i)));

  const showing = mapped.length;
  statShown.textContent = showing;
  statDisc.textContent = discontinued.size;
  empty.style.display = showing === 0 ? 'block' : 'none';
}

// ── Toggle ────────────────────────────────────────────────────────
function toggleDiscontinued(e, index, card) {
  // Ripple
  const rect = card.getBoundingClientRect();
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
  card.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  const wasDisc = discontinued.has(index);
  if (wasDisc) {
    discontinued.delete(index);
  } else {
    discontinued.add(index);
  }
  saveState();

  // Update card in place (no full re-render)
  const isDisc = !wasDisc;
  card.className = 'card' + (isDisc ? ' discontinued' : '');
  const action = card.querySelector('.card-action');
  action.innerHTML = `<div class="dot"></div>${isDisc ? 'Discontinued' : 'Click to mark discontinued'}`;

  // If filter would now hide this card, re-render
  if ((currentFilter === 'active' && isDisc) || (currentFilter === 'discontinued' && !isDisc)) {
    render();
  }

  statDisc.textContent = discontinued.size;

  showToast(isDisc
    ? '🚫 Marked as Discontinued'
    : '✅ Restored to Active');
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
const toast = document.getElementById('toast');
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Search ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

// ── Filter buttons ────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// ── Init ──────────────────────────────────────────────────────────
render();
</script>
